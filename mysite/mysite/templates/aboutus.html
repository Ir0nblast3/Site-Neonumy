{% load wagtailimages_tags %}

<section class="bg-white text-secondary py-5" id="aboutus">
    <div class="container-xxl text-center mt-5 mb-5">

        <h2 class="mb-4 aboutus-title">About Us</h2>

        <div class="row align-items-top justify-content-center">
            <div class="col-md-8">
                <div class="txt_aboutus mt-5 mb-5">{{ page.About_Us_Text_1 }}</div>
                
                {% if page.Aboutus_image %}
                    {% image page.Aboutus_image width-900 class="img-fluid d-block mx-auto"%}
                {% endif %}

                <div class="txt_aboutus mt-5 mb-5">{{ page.About_Us_Text_2 }}</div>

            </div>
        </div>

    </div>
</section>

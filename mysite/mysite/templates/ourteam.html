{% load wagtailimages_tags %}

<section class="text-white py-5 ourteam-bg" id="ourteam">
    <div class="container-xxl text-center mt-5 mb-5">
        <h2 class="mb-5 team-title">Our Team</h2>

        <div class="row align-items-top mt-5 mb-5">

            {% for member in page.teammembers.all %}

            <div class="col-sm-6 col-lg-3 mt-5">

                <div class="img-background">
                    <div class="person-img">

                        {% if member.image %}
                            {% image member.image original class="img-fluid" %}
                        {% endif %}
                    </div>
                </div>

                <div class="mt-4">
                    <div class="person_name">
                        {{ member.name }}
                    </div>

                    <div class="person_role">
                        {{ member.role }}
                    </div>
                </div>

            </div>

            {% endfor %}

        </div>
    </div>
</section>
